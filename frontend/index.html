<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>EU Compliance AI Assistant</title>
 
<style>
  /* Premium Σκούρο Θέμα */
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #0b0f19;
    color: #f1f5f9;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
 
  /* Ο κεντρικός Container που ελέγχει το layout */
  .container {
    width: 800px;
    max-width: 90%;
    display: flex;
    flex-direction: column;
    height: 100vh;
    justify-content: center;
    transition: justify-content 0.5s ease;
    position: relative;
  }
 
  /* Όταν ξεκινήσει το chat, μετακινείται το layout προς τα πάνω */
  .container.chat-active {
    justify-content: flex-start;
    padding-top: 40px;
  }
 
  /* Minimal Header */
  header {
    font-size: 24px;
    font-weight: 600;
    color: #f8fafc;
    letter-spacing: -0.02em;
    text-align: center;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.5s ease;
  }
 
  header::before {
    content: "";
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #10b981;
    border-radius: 50%;
    box-shadow: 0 0 12px #10b981;
  }
 
  .container.chat-active header {
    font-size: 18px;
    margin-bottom: 16px;
    justify-content: flex-start;
  }
 
  /* Η περιοχή των μηνυμάτων */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px 5px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 20px;
    opacity: 0;
    max-height: 0;
    transition: opacity 0.5s ease, max-height 0.5s ease;
  }
 
  .container.chat-active #chat {
    opacity: 1;
    max-height: calc(100vh - 180px);
  }
 
  /* Στυλ Μηνυμάτων στυλ Gemini */
  .msg {
    padding: 4px 0;
    max-width: 100%;
    white-space: pre-wrap;
    font-size: 16px;
    line-height: 1.7;
    animation: fadeIn 0.3s ease forwards;
  }
 
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  /* Μήνυμα Χρήστη (Σε γκρι πλαίσιο δεξιά) */
  .user {
    background: #1e293b;
    padding: 12px 20px;
    border-radius: 18px;
    max-width: 80%;
    margin-left: auto;
    color: #f8fafc;
  }
 
  /* Μήνυμα Bot (Καθαρό κείμενο αριστερά) */
  .bot {
    color: #e2e8f0;
    margin-right: auto;
    border-left: 2px solid #334155;
    padding-left: 16px;
  }
 
  .bot-error {
    color: #fca5a5;
    border-left-color: #ef4444;
  }
 
  /* Inline Code */
  .msg code {
    background: #1e293b;
    padding: 3px 6px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 14px;
    color: #38bdf8;
  }
 
  /* Μορφοποίηση Πηγής */
  .source-text {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-top: 12px;
    color: #94a3b8;
    font-style: italic;
  }
 
  /* Η Περιοχή Εισαγωγής (Input Area) */
  .input-container {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 30px;
    padding: 8px 14px 8px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
  }
 
  .input-container:focus-within {
    border-color: #64748b;
    box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.2);
  }
 
  textarea {
    flex: 1;
    height: 24px;
    resize: none;
    border: none;
    background: transparent;
    font-size: 16px;
    font-family: inherit;
    color: #f8fafc;
    outline: none;
    padding: 2px 0;
  }
 
  textarea::placeholder {
    color: #64748b;
  }
 
  /* Το στρογγυλό κουμπί Search */
  button {
    width: 40px;
    height: 40px;
    border: none;
    border-radius: 50%;
    background: #f8fafc;
    color: #0b0f19;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
 
  button:hover {
    background: #cbd5e1;
    transform: scale(1.04);
  }
 
  button:disabled {
    opacity: 0.3;
    background: #475569;
    color: #94a3b8;
    cursor: not-allowed;
    transform: none;
  }
 
  /* Custom Scrollbar */
  #chat::-webkit-scrollbar {
    width: 6px;
  }
  #chat::-webkit-scrollbar-track {
    background: transparent;
  }
  #chat::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
  }
 
  /* Loading Animation Dots */
  .typing-dots {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 0;
  }
 
  .typing-dots span {
    width: 7px;
    height: 7px;
    background-color: #64748b;
    border-radius: 50%;
    animation: blink 1.4s infinite both;
  }
 
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
 
  @keyframes blink {
    0% { opacity: .2; }
    20% { opacity: 1; }
    100% { opacity: .2; }
  }
</style>
</head>
 
<body>
 
<div class="container" id="mainContainer">
  <header>EU Compliance AI Assistant</header>
 
  <div id="chat"></div>
 
  <div class="input-container">
    <textarea id="input" placeholder="Ask anything about EU Compliance..." rows="1"></textarea>
    <button id="submitBtn" onclick="send()">➔</button>
  </div>
</div>
 
<script>
// 🌟 ΔΙΟΡΘΩΣΗ 1: Προσθήκη του σωστού prefix /retrieval
const API_URL = "http://localhost:8000/retrieval/query";
const chat = document.getElementById("chat");
const submitBtn = document.getElementById("submitBtn");
const inputField = document.getElementById("input");
const container = document.getElementById("mainContainer");
 
// Αυτόματη προσαρμογή ύψους του textarea
inputField.addEventListener("input", function() {
  this.style.height = "24px";
  this.style.height = (this.scrollHeight - 6) + "px";
});
 
// Υποστήριξη για Enter (αποστολή)
inputField.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
 
/**
 * Διαχειρίζεται τη μορφοποίηση του κειμένου και των sources.
 */
function formatBotResponse(text, sources = []) {
  // Ασφάλεια για την περίπτωση που το text είναι undefined/null
  if (!text) return "No text response received.";
 
  // 1. Προστασία από XSS επιθέσεις
  let html = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
 
  // 2. Υποστήριξη για inline κώδικα (μετατροπή των `κείμενο` σε <code>)
  html = html.replace(/`(.*?)`/g, '<code>$1</code>');
 
  // 3. Δημιουργία των Sources από τη λίστα που στέλνει το Backend (Χωρίς Διπλότυπα)
  let sourcesHtml = "";
  if (sources && sources.length > 0) {
    // 🌟 Χρησιμοποιούμε Set για να κρατήσουμε μόνο τα μοναδικά strings εμφάνισης
    const uniqueSources = new Set();
 
    sources.forEach(source => {
      const sourceStr = String(source || "");
      const cleanSource = sourceStr.replace(/\r?\n|\r/g, " ");
     
      // Αναζήτηση για αρχείο .pdf
      const fileMatch = cleanSource.match(/[^\\/,\s]+\.[a-zA-Z0-9]+/);
      let fileName = fileMatch ? fileMatch[0].trim() : "32016R0679_EN.pdf";
 
      // Αναζήτηση για αριθμό σελίδας
      const pageMatch = cleanSource.match(/Page\s*:?\s*(\d+)/i);
      let pageNum = pageMatch ? pageMatch[1].trim() : "1";
 
      // Φτιάχνουμε το τελικό κείμενο για αυτό το source
      const finalSourceLine = `(Source: ${fileName}, Page: ${pageNum})`;
     
      // Το βάζουμε στο Set. Αν υπάρχει ήδη, θα το αγνοήσει αυτόματα!
      uniqueSources.add(finalSourceLine);
    });
 
    // 🌟 Τώρα κάνουμε loop μόνο στα μοναδικά πλέον sources και τα μετατρέπουμε σε HTML
    uniqueSources.forEach(uniqueSource => {
      sourcesHtml += `<span class="source-text">${uniqueSource}</span>`;
    });
  }
 
  // Επιστρέφει το κείμενο με την τελεία του, και από κάτω τα sources
  return `${html}${sourcesHtml}`;
}
 
/**
 * Προσθέτει ένα νέο block μηνύματος
 */
function addMessage(text, type, sources = []) {
  const div = document.createElement("div");
  div.className = "msg " + type;
 
  if (type === "bot") {
    div.innerHTML = formatBotResponse(text, sources);
  } else {
    div.innerText = text;
  }
 
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
 
/**
 * Συλλέγει την ερώτηση, ενεργοποιεί το layout και καλεί το API
 */
async function send() {
  const text = inputField.value.trim();
  if (!text) return;
 
  // Ενεργοποίηση του Chat Layout
  if (!container.classList.contains("chat-active")) {
    container.classList.add("chat-active");
  }
 
  addMessage(text, "user");
  inputField.value = "";
  inputField.style.height = "24px";
 
  submitBtn.disabled = true;
 
  // Εμφάνιση Loading Animation
  const loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  chat.appendChild(loading);
  chat.scrollTop = chat.scrollHeight;
 
  try {
    // 🌟 ΔΙΟΡΘΩΣΗ 2: Αλλάζουμε το "question" σε "query" για να ταιριάζει με την Pydantic
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ query: text })
    });
 
    const data = await res.json();
    loading.remove();
 
    // 🌟 ΔΙΟΡΘΩΣΗ 3: Περνάμε το data.answer και τη λίστα data.sources στη συνάρτηση
    if (res.ok) {
      addMessage(data.answer, "bot", data.sources);
    } else {
      // Σε περίπτωση βλάβης από το FastAPI (π.χ. 422, 500)
      const errorMsg = data.detail ? JSON.stringify(data.detail) : "Unprocessable Entity";
      addMessage("Error from server: " + errorMsg, "bot bot-error");
    }
 
  } catch (e) {
    loading.remove();
    const errorDiv = document.createElement("div");
    errorDiv.className = "msg bot bot-error";
    errorDiv.innerText = "Error: " + e.message;
    chat.appendChild(errorDiv);
    chat.scrollTop = chat.scrollHeight;
  } finally {
    submitBtn.disabled = false;
    inputField.focus();
  }
}
</script>
 
</body>
</html>
